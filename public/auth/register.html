<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - TipweYT</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="/" class="auth-logo">
        <span class="logo-icon">▶</span>
        <span class="logo-text">TipweYT</span>
      </a>
      <h1 class="auth-title">Создать аккаунт</h1>
      <p class="auth-subtitle">Зарегистрируйтесь, чтобы получить доступ ко всем функциям</p>
      
      <form id="registerForm" class="auth-form">
        <div class="auth-field">
          <label>Имя пользователя</label>
          <input type="text" id="usernameInput" placeholder="Придумайте имя" required minlength="3">
        </div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="emailInput" placeholder="Введите email" required>
        </div>
        <div class="auth-field">
          <label>Пароль</label>
          <input type="password" id="passwordInput" placeholder="Минимум 6 символов" required minlength="6">
        </div>
        <div class="auth-field">
          <label>Подтвердите пароль</label>
          <input type="password" id="passwordConfirmInput" placeholder="Повторите пароль" required>
        </div>
        <div class="auth-error" id="authError" style="display:none"></div>
        <button type="submit" class="auth-btn" id="authBtn">
          <span id="authBtnText">Зарегистрироваться</span>
          <div class="btn-spinner" id="authSpinner" style="display:none">
            <div class="spinner-small"></div>
          </div>
        </button>
      </form>
      
      <p class="auth-link">Уже есть аккаунт? <a href="/auth/login.html">Войти</a></p>
      <a href="/" class="auth-back">← На главную</a>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
