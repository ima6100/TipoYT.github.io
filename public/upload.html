<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Загрузить видео - TipweYT</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">
        <span class="logo-icon">▶</span>
        <span class="logo-text">TipweYT</span>
      </a>
      <div class="search-bar">
        <form action="/" method="GET">
          <input type="text" name="q" placeholder="Поиск видео..." autocomplete="off">
          <button type="submit" class="search-btn">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </button>
        </form>
      </div>
      <div class="header-actions">
        <a href="/upload.html" class="btn-upload active">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
          <span>Загрузить</span>
        </a>
        <div class="user-menu" id="userMenu"></div>
      </div>
    </div>
  </header>

  <div class="upload-page">
    <div class="upload-container">
      <h1 class="upload-title">Загрузить видео</h1>
      <p class="upload-subtitle">Поделитесь своим видео с миром на TipweYT</p>
      
      <form id="uploadForm" class="upload-form" enctype="multipart/form-data">
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-content" id="dropzoneContent">
            <svg viewBox="0 0 24 24" width="64" height="64"><path fill="#909090" d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM9 8v8l7-4z"/></svg>
            <h3>Выберите видео для загрузки</h3>
            <p>или перетащите файл сюда</p>
            <p class="file-hint">MP4, WebM, AVI, MKV до 500 МБ</p>
            <input type="file" id="videoFile" name="video" accept="video/*" class="file-input" hidden>
            <button type="button" class="btn-select-file" onclick="document.getElementById('videoFile').click()">Выбрать файл</button>
          </div>
          <div class="dropzone-preview" id="dropzonePreview" style="display:none">
            <div class="file-info">
              <svg viewBox="0 0 24 24" width="40" height="40"><path fill="#4CAF50" d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
              <div>
                <strong id="fileName">video.mp4</strong>
                <span id="fileSize">0 МБ</span>
              </div>
              <button type="button" class="btn-remove-file" onclick="removeFile()">✕</button>
            </div>
          </div>
        </div>

        <div class="upload-section">
          <label class="upload-label">Превью (необязательно)</label>
          <div class="thumbnail-upload">
            <input type="file" id="thumbnailFile" name="thumbnail" accept="image/*" hidden>
            <div class="thumbnail-placeholder" id="thumbnailPlaceholder" onclick="document.getElementById('thumbnailFile').click()">
              <svg viewBox="0 0 24 24" width="32" height="32"><path fill="#909090" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
              <span>Добавить превью</span>
            </div>
            <img id="thumbnailPreview" class="thumbnail-preview" style="display:none" alt="Превью">
            <button type="button" class="btn-remove-thumb" id="removeThumbBtn" style="display:none" onclick="removeThumb()">✕</button>
          </div>
        </div>

        <div class="upload-section">
          <label class="upload-label" for="title">Название видео *</label>
          <input type="text" id="title" name="title" class="upload-input" placeholder="Введите название видео..." required maxlength="100">
        </div>
        <div class="upload-section">
          <label class="upload-label" for="description">Описание</label>
          <textarea id="description" name="description" class="upload-textarea" placeholder="Расскажите о своём видео..." rows="4"></textarea>
        </div>

        <div class="upload-row">
          <div class="upload-section upload-half">
            <label class="upload-label" for="channelName">Название канала</label>
            <input type="text" id="channelName" name="channelName" class="upload-input" placeholder="Мой канал" value="Мой канал">
          </div>
          <div class="upload-section upload-half">
            <label class="upload-label" for="category">Категория</label>
            <select id="category" name="category" class="upload-select">
              <option value="Разное">Разное</option>
              <option value="Музыка">Музыка</option>
              <option value="Игры">Игры</option>
              <option value="Образование">Образование</option>
              <option value="Новости">Новости</option>
              <option value="Спорт">Спорт</option>
              <option value="Фильмы">Фильмы</option>
              <option value="Юмор">Юмор</option>
              <option value="Технологии">Технологии</option>
              <option value="Путешествия">Путешествия</option>
              <option value="Кулинария">Кулинария</option>
              <option value="Наука">Наука</option>
              <option value="Авто">Авто</option>
              <option value="Животные">Животные</option>
              <option value="Лайфхак">Лайфхак</option>
            </select>
          </div>
        </div>

        <div class="upload-section">
          <label class="upload-label" for="tags">Теги (через запятую)</label>
          <input type="text" id="tags" name="tags" class="upload-input" placeholder="например: природа, путешествия, 2026">
        </div>

        <div class="upload-actions">
          <button type="submit" class="btn-publish" id="publishBtn">
            <span id="publishText">Опубликовать</span>
            <div class="btn-spinner" id="btnSpinner" style="display:none">
              <div class="spinner-small"></div>
              <span>Загрузка...</span>
            </div>
          </button>
          <a href="/" class="btn-cancel">Отмена</a>
        </div>
      </form>

      <div class="upload-progress" id="uploadProgress" style="display:none">
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText">Загрузка: 0%</p>
      </div>

      <div class="upload-result" id="uploadResult" style="display:none">
        <svg viewBox="0 0 24 24" width="64" height="64"><path fill="#4CAF50" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <h2>Видео успешно загружено!</h2>
        <p id="resultTitle"></p>
        <a id="resultLink" href="" class="btn-watch">Смотреть видео</a>
        <a href="/upload.html" class="btn-upload-more">Загрузить ещё</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/upload.js"></script>
</body>
</html>
