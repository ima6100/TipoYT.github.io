<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ВидеоХаб - Просмотр</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Шапка -->
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">
        <span class="logo-icon">▶</span>
        <span class="logo-text">ВидеоХаб</span>
      </a>
      <div class="search-bar">
        <form id="searchForm" action="/" method="GET">
          <input type="text" name="q" id="searchInput" placeholder="Поиск видео..." autocomplete="off">
          <button type="submit" class="search-btn">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </button>
        </form>
      </div>
      <div class="header-actions">
        <a href="/upload.html" class="btn-upload">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
          <span>Загрузить</span>
        </a>
      </div>
    </div>
  </header>

  <div class="watch-layout">
    <div class="watch-main">
      <!-- Плеер -->
      <div class="video-player-container">
        <video id="videoPlayer" class="video-player" controls autoplay>
          <source id="videoSource" src="" type="video/mp4">
          Ваш браузер не поддерживает видео.
        </video>
      </div>

      <!-- Информация о видео -->
      <div class="video-info" id="videoInfo">
        <h1 class="video-title" id="videoTitle">Загрузка...</h1>
        
        <div class="video-meta">
          <div class="video-stats">
            <span id="videoViews">0</span> просмотров • 
            <span id="videoDate">сегодня</span>
          </div>
          
          <div class="video-actions">
            <button class="action-btn like-btn" id="likeBtn" onclick="likeVideo()">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
              <span id="likesCount">0</span>
            </button>
            <button class="action-btn dislike-btn" id="dislikeBtn" onclick="dislikeVideo()">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
              <span id="dislikesCount">0</span>
            </button>
          </div>
        </div>

        <!-- Канал -->
        <div class="channel-info">
          <div class="channel-avatar">
            <span id="channelAvatar">К</span>
          </div>
          <div class="channel-details">
            <h3 class="channel-name" id="channelName">Канал</h3>
            <span class="channel-subs" id="channelSubs">0 подписчиков</span>
          </div>
          <button class="btn-subscribe">Подписаться</button>
        </div>

        <!-- Описание -->
        <div class="video-description" id="videoDescription">
          <p>Описание загружается...</p>
        </div>

        <!-- Категория -->
        <div class="video-category">
          <span class="category-badge" id="videoCategory">Разное</span>
        </div>
      </div>

      <!-- Комментарии -->
      <div class="comments-section">
        <h2 class="comments-title">
          Комментарии 
          <span class="comments-count" id="commentsCount">0</span>
        </h2>
        
        <div class="add-comment">
          <div class="comment-avatar">В</div>
          <div class="comment-input-wrapper">
            <input type="text" id="commentName" placeholder="Ваше имя" class="comment-name-input" value="Пользователь">
            <textarea id="commentText" placeholder="Оставьте комментарий..." rows="2" class="comment-textarea"></textarea>
            <button class="btn-comment" onclick="addComment()">Отправить</button>
          </div>
        </div>

        <div class="comments-list" id="commentsList">
          <div class="loading-comments">Загрузка комментариев...</div>
        </div>
      </div>
    </div>

    <!-- Боковая панель с рекомендациями -->
    <div class="watch-sidebar">
      <h3 class="sidebar-title">Рекомендуемые видео</h3>
      <div class="recommended-videos" id="recommendedVideos">
        <!-- Подгрузятся через JS -->
      </div>
    </div>
  </div>

  <script src="/js/player.js"></script>
</body>
</html>
